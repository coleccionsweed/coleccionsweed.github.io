<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Colección Sweed</title>

  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <header class="topbar">
    <h1>Colección Sweed</h1>

	<div id="filters">

	  <select id="categoryFilter"></select>
	  <select id="franchiseFilter"></select>

	  <select id="sortOrder">
	    <option value="">Ordenar por...</option>
	    <option value="name-asc">Nombre (A-Z)</option>
	    <option value="name-desc">Nombre (Z-A)</option>
	    <option value="price-asc">Precio (Menor a Mayor)</option>
	    <option value="price-desc">Precio (Mayor a Menor)</option>
	  </select>

	  <input id="search" placeholder="Buscar...">

	</div>
  </header>

  <aside class="sidebar" id="filtersContainer">
  </aside>

  <main>
    <section class="stats" id="stats"></section>

    <section class="collection-grid" id="collectionGrid"></section>
	<div id="items-counter" class="items-counter"></div>
  </main>

  <div class="modal hidden" id="modal"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
