<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colección Sweed</title>
  <link rel="stylesheet" href="styles/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header class="topbar">
    <h1><a href="#" style="color: inherit; text-decoration: none;">Colección Sweed</a></h1>

	<nav class="nav-links" style="display: flex; gap: 20px; margin: 0 20px;">
	  <a href="#" id="navGallery" style="color: #fff; font-weight: bold; text-decoration: none; cursor: pointer;">🖼️ Galería</a>
	  <a href="#stats" id="navStats" style="color: #9ca3af; font-weight: bold; text-decoration: none; cursor: pointer;">📊 Estadísticas Globales</a>
	</nav>

    <div id="filters">
      <select id="categoryFilter"></select>
      <select id="franchiseFilter"></select>

      <select id="sortOrder">
        <option value="">Ordenar por...</option>
        <option value="name-asc">Nombre (A-Z)</option>
        <option value="name-desc">Nombre (Z-A)</option>
        <option value="price-asc">Precio (Menor a Mayor)</option>
        <option value="price-desc">Precio (Mayor a Menor)</option>
      </select>

      <input id="search" placeholder="Buscar...">
    </div>
  </header>

  <aside class="sidebar" id="filtersContainer"></aside>

  <main>
    <section id="galleryView">
      <section class="collection-grid" id="collectionGrid"></section>
      <div id="items-counter" class="items-counter"></div>
    </section>

    <section id="statsView" class="hidden" style="display: none; padding: 20px; max-width: 1200px; margin: 0 auto;">
      
      <div class="stats-cards-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <div class="stat-card" style="background: #1f2937; padding: 20px; border-radius: 12px; border: 1px border #374151; text-align: center;">
          <h3 style="color: #9ca3af; font-size: 0.9rem; text-transform: uppercase; margin: 0;">💰 Inversión Total</h3>
          <p id="statTotalValue" style="color: #10b981; font-size: 2.5rem; font-weight: 900; margin: 10px 0 0 0;">0,00 €</p>
        </div>
        <div class="stat-card" style="background: #1f2937; padding: 20px; border-radius: 12px; border: 1px border #374151; text-align: center;">
          <h3 style="color: #9ca3af; font-size: 0.9rem; text-transform: uppercase; margin: 0;">📦 Modelos Únicos</h3>
          <p id="statTotalItems" style="color: #6366f1; font-size: 2.5rem; font-weight: 900; margin: 10px 0 0 0;">0</p>
        </div>
        <div class="stat-card" style="background: #1f2937; padding: 20px; border-radius: 12px; border: 1px border #374151; text-align: center;">
          <h3 style="color: #9ca3af; font-size: 0.9rem; text-transform: uppercase; margin: 0;">🔢 Total Unidades (Stock)</h3>
          <p id="statTotalQuantity" style="color: #f59e0b; font-size: 2.5rem; font-weight: 900; margin: 10px 0 0 0;">0</p>
        </div>
      </div>

      <div class="charts-row" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px; margin-bottom: 30px;">
        <div class="chart-block" style="background: #1f2937; padding: 25px; border-radius: 12px; display: flex; flex-direction: column; align-items: center;">
          <h3 style="color: #indigo-400; font-size: 1.2rem; margin: 0 0 20px 0; width: 100%; text-align: left;">🍩 Distribución por Categoría (Rosco)</h3>
          <div style="width: 100%; max-width: 350px; height: 350px; position: relative;">
            <canvas id="chartCategories"></canvas>
          </div>
        </div>

        <div class="chart-block" style="background: #1f2937; padding: 25px; border-radius: 12px; display: flex; flex-direction: column; align-items: center;">
          <h3 style="color: #indigo-400; font-size: 1.2rem; margin: 0 0 20px 0; width: 100%; text-align: left;">📊 Estado de Conservación</h3>
          <div style="width: 100%; height: 350px;">
            <canvas id="chartCondition"></canvas>
          </div>
        </div>
      </div>

      <div class="tables-row" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 30px;">
        <div class="table-block" style="background: #1f2937; padding: 25px; border-radius: 12px;">
          <h3 style="color: #10b981; font-size: 1.2rem; margin: 0 0 15px 0;">🏆 Top 5 Franquicias más Valiosas</h3>
          <div id="topFranchisesTable"></div>
        </div>

        <div class="table-block" style="background: #1f2937; padding: 25px; border-radius: 12px;">
          <h3 style="color: #f59e0b; font-size: 1.2rem; margin: 0 0 15px 0;">🏷️ Marcas Líderes en tu Colección</h3>
          <div id="topBrandsTable"></div>
        </div>
      </div>

    </section>
  </main>

  <div class="modal hidden" id="modal"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
