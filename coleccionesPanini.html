  .grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 10px;
    padding: 100px;
	padding-top: 150px;
  }
  .grid-item {
    border: none;
    padding: 10px;
    text-align: center;
    transition: transform 0.3s ease-in-out;
    cursor: pointer;
  }
  .grid-item:hover {
    transform: scale(1.7);
  }
  .grid-item img {
    max-width: 100%;
    height: auto;
    transition: transform 0.3s ease-in-out;
  }

  /* Estilos para el selector */
  .selector-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
  }

  .selector-container select {
    margin: 0 10px;
  }
</style>

				testImage.onload = function() {
					// Si la imagen existe, no se hace nada
				}
				testImage.onerror = function() {
					// Si la imagen no existe, se elimina el contenedor del DOM
					console.error(`La imagen ${imageUrl} no existe.`);
					grid.parentNode.removeChild(grid); // Eliminar el contenedor
				}

				// Cargar la imagen de prueba
				testImage.src = imageUrl;
			} else {
				// Si no hay una imagen en el contenedor, eliminar el contenedor directamente
				grid.parentNode.removeChild(grid);
			}
		}
	}


</script>
