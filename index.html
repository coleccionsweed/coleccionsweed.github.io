<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colección Sweed</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <link rel="manifest" href="site.webmanifest">

  <link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5">

  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">
</head>
<body>

  <header class="topbar">
    <div style="display: flex; align-items: center; gap: 30px;">
      <h1 style="margin: 0;"><a href="/" style="color: inherit; text-decoration: none;">Colección Sweed</a></h1>
      
      <nav class="nav-links" style="display: flex; gap: 20px;">
        <a href="/" style="color: #ffffff; font-weight: 700; text-decoration: none; font-size: 15px;">🖼️ Galería</a>
        <a href="stats" style="color: #6b7280; font-weight: 700; text-decoration: none; font-size: 15px; transition: color 0.2s;">📊 Estadísticas</a>
      </nav>
    </div>

    <div id="filters">
      <select id="categoryFilter"></select>
      <select id="franchiseFilter"></select>

      <select id="sortOrder">
        <option value="name-asc">Nombre (A-Z)</option>
        <option value="name-desc">Nombre (Z-A)</option>
        <option value="price-asc">Precio (Menor a Mayor)</option>
        <option value="price-desc">Precio (Mayor a Menor)</option>
		<option value="year-asc">Año (Más antiguo primero)</option>
		<option value="year-desc">Año (Más reciente primero)</option>
      </select>

      <input id="search" placeholder="Buscar...">
    </div>
  </header>

  <aside class="sidebar" id="filtersContainer"></aside>

  <main>
    <section class="collection-grid" id="collectionGrid"></section>
    <div id="items-counter" class="items-counter"></div>
  </main>

  <div class="modal hidden" id="modal"></div>

  <script src="js/jquery.js"></script>
  <script src="js/turn.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
