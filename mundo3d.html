<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundo 3D - Colección Sweed</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    /* Estilos específicos para bloquear la pantalla hasta que el usuario haga clic para entrar al modo 3D */
    body { margin: 0; overflow: hidden; background-color: #87CEEB; } /* Cielo azul de fondo por defecto */
    #blocker {
      position: absolute; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; font-family: sans-serif; text-align: center; z-index: 100;
    }
    #instructions { cursor: pointer; }
    #instructions span { font-size: 24px; font-weight: bold; }
    #crosshair {
      position: absolute; top: 50%; left: 50%;
      width: 20px; height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 50;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: white;
    }
    #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
    #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
  </style>
</head>
<body>

  <header class="topbar" style="position: absolute; width: 100%; top: 0; z-index: 10;">
    <div style="display: flex; align-items: center; gap: 30px;">
      <h1 style="margin: 0;"><a href="/" style="color: inherit; text-decoration: none;">Colección Sweed</a></h1>
      <nav class="nav-links" style="display: flex; gap: 20px;">
        <a href="/" style="color: #6b7280; font-weight: 700; text-decoration: none; font-size: 15px;">🖼️ Galería</a>
        <a href="stats" style="color: #6b7280; font-weight: 700; text-decoration: none; font-size: 15px;">📊 Estadísticas</a>
        <a href="mundo3d.html" style="color: #ffffff; font-weight: 700; text-decoration: none; font-size: 15px;">🌍 Mundo 3D</a>
      </nav>
    </div>
  </header>

  <div id="blocker">
    <div id="instructions">
      <span>Haz clic para explorar el Mundo 3D</span>
      <p>Mueve el ratón para mirar<br/>W, A, S, D = Moverse</p>
    </div>
  </div>

  <div id="crosshair"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="js/mundo3d.js"></script>
</body>
</html>
